# ─────────────────────────────────────────────────────────
#  IOX — template docker-compose préprod
# ─────────────────────────────────────────────────────────
#  Copier vers l'hôte préprod puis :
#    1. Renseigner un fichier `.env` à côté (voir .env.preprod.example)
#    2. docker compose -f docker-compose.preprod.yml --env-file .env up -d
#    3. Vérifier :
#        curl -fsS http://127.0.0.1:3001/api/v1/health/live
#        curl -fsS http://127.0.0.1:3000/
#
#  Les ports 3000/3001 ne sont exposés qu'à l'hôte (127.0.0.1:…) —
#  le reverse proxy (Nginx/Traefik) en front fait la terminaison TLS.
# ─────────────────────────────────────────────────────────
version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-iox}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      POSTGRES_DB: ${POSTGRES_DB:-iox_preprod}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-iox} -d ${POSTGRES_DB:-iox_preprod}']
      interval: 10s
      timeout: 5s
      retries: 5
    # Pas d'exposition externe : accessible uniquement via le réseau compose.

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD required}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 15s
      timeout: 5s
      retries: 5

  backend:
    image: ${BACKEND_IMAGE:?BACKEND_IMAGE required (ex: iox/backend:<tag>)}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      APP_ENV: staging
      APP_PORT: '3001'
      FRONTEND_URL: ${FRONTEND_URL:?FRONTEND_URL required (https://…)}
      DATABASE_URL: postgresql://${POSTGRES_USER:-iox}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-iox_preprod}?sslmode=disable
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      MINIO_ENDPOINT: minio
      MINIO_PORT: '9000'
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET:-iox-preprod}
      MINIO_USE_SSL: 'false'
      METRICS_TOKEN: ${METRICS_TOKEN:-}
    ports:
      - '127.0.0.1:3001:3001'
    # Healthcheck défini dans le Dockerfile (GET /api/v1/health/live).

  frontend:
    image: ${FRONTEND_IMAGE:?FRONTEND_IMAGE required (ex: iox/frontend:<tag>)}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    environment:
      BACKEND_INTERNAL_URL: http://backend:3001
      PORT: '3000'
    ports:
      - '127.0.0.1:3000:3000'

volumes:
  postgres_data:
  redis_data:
  minio_data:
