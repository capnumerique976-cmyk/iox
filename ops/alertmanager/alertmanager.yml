# IOX — Alertmanager routing (exemple)
#
# Répartit les alertes par sévérité / équipe sur les canaux pertinents.
# Remplacer les `api_url` / emails par les vraies valeurs en prod.

global:
  resolve_timeout: 5m
  smtp_from: alerts@iox.local
  smtp_smarthost: smtp.internal:587
  smtp_auth_username: alerts@iox.local
  smtp_auth_password_file: /etc/alertmanager/secrets/smtp-password

templates:
  - /etc/alertmanager/templates/*.tmpl

route:
  group_by: ['alertname', 'service']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: ops-default

  routes:
    # Critiques — pager immédiat
    - matchers:
        - severity="critical"
      receiver: ops-pager
      group_wait: 10s
      repeat_interval: 1h
      continue: true

    # Alertes équipe qualité (revue, documents)
    - matchers:
        - team="quality"
      receiver: quality-slack

    # Signaux info — email digest 1x/jour
    - matchers:
        - severity="info"
      receiver: ops-digest
      group_interval: 1h
      repeat_interval: 24h

receivers:
  - name: ops-default
    slack_configs:
      - api_url_file: /etc/alertmanager/secrets/slack-ops
        channel: '#iox-alerts'
        title: '[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
        text: >-
          {{ range .Alerts }}*{{ .Annotations.summary }}*
          {{ .Annotations.description }}
          {{ if .Annotations.runbook }}Runbook : {{ .Annotations.runbook }}{{ end }}
          {{ end }}

  - name: ops-pager
    slack_configs:
      - api_url_file: /etc/alertmanager/secrets/slack-ops
        channel: '#iox-incidents'
        send_resolved: true
    # Si PagerDuty/Opsgenie, décommenter :
    # pagerduty_configs:
    #   - routing_key_file: /etc/alertmanager/secrets/pagerduty-key

  - name: quality-slack
    slack_configs:
      - api_url_file: /etc/alertmanager/secrets/slack-quality
        channel: '#iox-quality'
        send_resolved: true

  - name: ops-digest
    email_configs:
      - to: ops-digest@iox.local
        send_resolved: false

inhibit_rules:
  # Une alerte critique fait taire ses variantes warning sur le même service.
  - source_matchers:
      - severity="critical"
    target_matchers:
      - severity="warning"
    equal: ['alertname', 'service']

  # Quand le backend est down, inhiber les alertes latence/5xx
  # (conséquence mécanique).
  - source_matchers:
      - alertname="IoxBackendDown"
    target_matchers:
      - severity=~"warning|critical"
      - service="iox-backend"
    equal: ['service']
