<?xml version="1.0" encoding="UTF-8"?>
<!-- IOX — Emblème version claire (pour fonds sombres : header navy, hero login tile, etc.) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="IOX">
  <defs>
    <linearGradient id="emblem-ring-dk" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e6f1fb"/>
    </linearGradient>
  </defs>

  <!-- Anneau blanc -->
  <circle cx="50" cy="52" r="40" fill="none" stroke="url(#emblem-ring-dk)" stroke-width="6"/>

  <!-- Swoosh sky-light -->
  <path d="M 14 58 A 40 40 0 0 1 86 58" fill="none" stroke="#5ab7e8" stroke-width="5.5" stroke-linecap="round"/>

  <!-- Feuille vert clair -->
  <path d="M 26 66 Q 31 42 48 35 Q 41 57 32 72 Q 28 72 26 66 Z" fill="#3dd47f"/>

  <!-- Lettre i blanc -->
  <rect x="44" y="43" width="6" height="25" rx="1.2" fill="#ffffff"/>
  <rect x="44" y="33" width="6" height="6" rx="1" fill="#5ab7e8"/>

  <!-- Lettre o (anneau) blanc -->
  <circle cx="64" cy="55" r="12" fill="none" stroke="#ffffff" stroke-width="5.5"/>

  <!-- Réseau vert clair -->
  <g transform="translate(82, 20)">
    <line x1="0" y1="0" x2="-7" y2="7" stroke="#3dd47f" stroke-width="1.6"/>
    <line x1="0" y1="0" x2="8" y2="-4" stroke="#3dd47f" stroke-width="1.6"/>
    <line x1="0" y1="0" x2="6" y2="9" stroke="#3dd47f" stroke-width="1.6"/>
    <circle cx="0" cy="0" r="2.8" fill="#3dd47f"/>
    <circle cx="-7" cy="7" r="2.2" fill="#3dd47f"/>
    <circle cx="8" cy="-4" r="2.2" fill="#3dd47f"/>
    <circle cx="6" cy="9" r="2.2" fill="#3dd47f"/>
  </g>
</svg>
